version: "3.9"

services:
  app:
    build:
      context: .
      target: runtime
    image: procurement-platform:latest
    container_name: procurement_app
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
    volumes:
      - procurement_db:/app/db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  procurement_db:
    driver: local
