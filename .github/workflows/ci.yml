name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-not-for-prod

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build --target runtime -t procurement-platform:${{ github.sha }} .

      - name: Smoke test
        run: |
          docker run -d --name pv_ci -p 4001:4000 \
            -e JWT_SECRET=ci-only \
            procurement-platform:${{ github.sha }}
          sleep 3
          curl -sf http://localhost:4001/api/health
          docker stop pv_ci
